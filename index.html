<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار التفكير الابتكاري </title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-glow: linear-gradient(45deg, #ff7675, #fdcb6e, #00cec9, #6c5ce7);
            --success-color: #10b981;
            --error-color: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            padding-top: 110px;
        }

        /* شريط النتيجة الثابت في الأعلى بتصميم زجاجي */
        .score-board {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
            z-index: 1000;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            font-size: 1.1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .counters-container {
            display: flex;
            gap: 30px;
        }

        .score-item {
            display: flex;
            align-items: center;
            gap: 8px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .score-item.correct-count { color: #34d399; }
        .score-item.wrong-count { color: #f87171; }

        /* ستايل اسم Moza المتوهج */
        .user-tag {
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 22px;
            border-radius: 30px;
            font-size: 1.4rem;
            font-weight: 900;
            box-shadow: 0 0 20px rgba(108, 92, 231, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            gap: 6px;
            position: relative;
            overflow: hidden;
        }

        .user-tag::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            animation: tagShine 3.5s infinite linear;
        }

        @keyframes tagShine {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .user-tag-name {
            background: var(--accent-glow);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: tagGradientText 3s infinite linear;
            font-family: 'Arial Black', Gadget, sans-serif;
            letter-spacing: 1px;
        }

        @keyframes tagGradientText {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .fire-icon {
            animation: pulseFire 1.5s ease-in-out infinite;
        }

        @keyframes pulseFire {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 2px #ff7675); }
            50% { transform: scale(1.2); filter: drop-shadow(0 0 8px #ff7675); }
        }

        /* ستايل نافذة الترحيب المنبثقة */
        .welcome-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.4s ease;
        }

        .welcome-popup {
            background: #1e1b4b;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), 0 0 30px rgba(99, 102, 241, 0.2);
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        .welcome-popup h2 {
            font-size: 2.8rem;
            background: var(--accent-glow);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 10px 0;
            font-family: 'Arial Black', sans-serif;
        }

        .welcome-popup p {
            font-size: 1.3rem;
            color: var(--text-muted);
            margin-bottom: 25px;
        }

        .start-btn {
            background: linear-gradient(45deg, #6366f1, #a855f7);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
            transition: all 0.3s ease;
        }

        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(99, 102, 241, 0.7);
        }

        .welcome-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 35px;
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        header h1 {
            font-size: 2.2rem;
            margin: 0 0 10px 0;
            color: #ffffff;
        }

        header p {
            color: #a855f7;
            font-size: 1.3rem;
            font-weight: bold;
            margin: 0;
        }

        .question-card {
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .question-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.45);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 20px;
            line-height: 1.7;
        }

        .question-type-badge {
            display: inline-block;
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-weight: bold;
            background: rgba(255,255,255,0.1);
            color: #e2e8f0;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 14px 20px;
            font-size: 1rem;
            color: #cbd5e1;
            cursor: pointer;
            text-align: right;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
        }

        .option-btn:hover:not([disabled]) {
            background-color: rgba(99, 102, 241, 0.15);
            border-color: #6366f1;
            color: #ffffff;
            transform: translateX(-3px);
        }

        .option-btn.correct {
            background-color: var(--success-color) !important;
            color: white !important;
            border-color: var(--success-color) !important;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        .option-btn.wrong {
            background-color: var(--error-color) !important;
            color: white !important;
            border-color: var(--error-color) !important;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }

        /* صندوق التعليل والتصحيح */
        .correction-box {
            margin-top: 15px;
            padding: 15px;
            background: rgba(30, 41, 59, 0.9);
            border-right: 4px solid #6366f1;
            border-radius: 6px;
            font-size: 1rem;
            color: #e2e8f0;
            display: none;
            line-height: 1.6;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        
        .correction-box.show-info {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tf-container {
            display: flex;
            gap: 15px;
        }

        .tf-container .option-btn {
            text-align: center;
            font-weight: bold;
        }

        .disabled {
            pointer-events: none;
            opacity: 0.75;
        }

        .footer-admin-card {
            margin-top: 70px;
            margin-bottom: 40px;
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #0f172a, #1e1b4b);
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 25px rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            overflow: hidden;
        }

        .footer-admin-text {
            color: #e2e8f0;
            font-size: 1.15rem;
            margin: 0;
            font-weight: 500;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .footer-admin-name {
            background: var(--accent-glow);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            font-size: 1.6rem;
            text-transform: uppercase;
            animation: gradientText 3s infinite linear;
            display: inline-block;
        }

        @keyframes gradientText {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .crown-icon {
            font-size: 1.5rem;
            animation: floatIcon 2s ease-in-out infinite;
        }

        @keyframes floatIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px) scale(1.1); }
        }
    </style>
</head>
<body>

<div class="welcome-overlay" id="welcomeOverlay">
    <div class="welcome-popup">
        <h2>Welcome!</h2>
        <p>جاهز للاختبار العشوائي والمُفاجئ يا <strong>الطالب</strong>؟</p>
        <button class="start-btn" onclick="closeWelcome()">ابدأ الاختبار المُلغبط الآن</button>
    </div>
</div>

<div class="score-board">
    <div class="counters-container">
        <div class="score-item correct-count">الإجابات الصحيحة: <span id="correct-score">0</span></div>
        <div class="score-item wrong-count">عدد الأخطاء (كام غلطة): <span id="wrong-score">0</span></div>
    </div>
    
    <div class="user-tag">
        <span class="user-tag-name">Moza</span>
        <span class="fire-icon">🔥</span>
    </div>
</div>

<div class="container">
    <header>
        <h1>بنك الأسئلة الشامل (النسخة العشوائية المتكاملة)</h1>
        <p>اختبار التفكير الابتكاري</p>
    </header>

    <div id="quiz-container"></div>

    <div class="footer-admin-card">
        <p class="footer-admin-text">
            <span class="crown-icon">👑</span>
            تحت إشراف أدمن الجروب:
            <span class="footer-admin-name">Moza</span>
        </p>
    </div>
</div>

<script>
    function closeWelcome() {
        document.getElementById('welcomeOverlay').classList.add('hidden');
    }

    let totalCorrect = 0;
    let totalWrong = 0;

    function updateScoreBoard() {
        document.getElementById('correct-score').innerText = totalCorrect;
        document.getElementById('wrong-score').innerText = totalWrong;
    }

    // تم إضافة نوع السؤال وجملة التوضيح لكل سؤال ليعمل الكود بشكل سليم وتفاعلي
    const allQuestionsCorrectedAndRandomized = [
      { id: 1, type: "mcq", question: "ابتكارات سياسة الترويج تشمل علي:", options: ["سياسة الإعلان", "سياسة البيع الشخصي", "الاثنان معاً"], answer: "الاثنان معاً", correction: "الترويج يعتمد كلياً على الإعلان والبيع الشخصي كأدوات أساسية." },
      { id: 2, type: "tf", question: "عادة يسعى المفكر إلى التحرر الفكري والعمل على التخلص من القيود والأفكار التي تعيق تطلعاته.", answer: true, correction: "صحيح، التحرر من القيود الفكرية التقليدية أساس التفكير الإبداعي." },
      { id: 3, type: "tf", question: "يقصد بالطلاقة الفكرية قدرة الفرد المبتكر على إنتاج أكبر عدد ممكن من الجمل والعبارات خلال وحدة زمنية معينة.", answer: false, correction: "خطأ: هذه طلاقة لفظية وليست فكرية." },
      { id: 4, type: "tf", question: "طريقة دلفاي من طرق تنمية التفكير الابتكاري.", answer: true, correction: "صحيح: دلفاي هي طريقة لتوليد الأفكار وتنميتها عبر استطلاع آراء الخبراء." },
      { id: 5, type: "tf", question: "تعتبر نظرية المباراة إحدى نماذج بحوث العمليات.", answer: true, correction: "صحيح، تستخدم كأداة رياضية لتحليل القرارات في مواقف التنافس." },
      { id: 6, type: "mcq", question: "القدرة على إنتاج أكبر عدد من الأفكار أو البدائل خلال وحدة زمنية معينة:", options: ["الطلاقة اللفظية", "الطلاقة الفكرية", "طلاقة الأشكال"], answer: "الطلاقة الفكرية", correction: "الطلاقة الفكرية تركز على توليد الأفكار البديلة بسرعة وبكمية كبيرة." },
      { id: 7, type: "tf", question: "الحاجات الاجتماعية يمكن إشباعها من خلال المأكل والمشرب والمسكن.", answer: false, correction: "خطأ: هذه حاجات فسيولوجية (أساسية) وليست اجتماعية." },
      { id: 8, type: "mcq", question: "أهم السمات أو الخصائص التي تميز المبتكرين:", options: ["مهارات اتصال عالية", "ارتفاع مستوى الذكاء", "كل ما سبق"], answer: "كل ما سبق", correction: "المبتكر يجمع عادةً بين الذكاء المتميز والقدرة على التواصل بفاعلية." },
      { id: 9, type: "tf", question: "التفكير الابتكاري نتاج تفاعل بين مجموعة من القدرات العقلية والسمات الشخصية والظروف البيئية المحيطة بالفرد.", answer: true, correction: "صحيح، لأن الابتكار لا ينشأ من الذكاء وحده بل يحتاج بيئة محفزة وصفات شخصية كالمثابرة." },
      { id: 10, type: "tf", question: "تقتصر مجالات الابتكار والإبداع على العلوم الطبيعية وداخل المعامل الفيزيائية والكيميائية، دون العلوم الإنسانية.", answer: false, correction: "خطأ: الابتكار يمتد للعلوم الإنسانية والإدارية والاجتماعية أيضاً." },
      { id: 11, type: "mcq", question: "بصفة عامة يستخدم الإبداع في:", options: ["التجارب العلمية", "المجالات التكنولوجية", "المجالات الفنية"], answer: "المجالات الفنية", correction: "تقليدياً، يرتبط مصطلح الإبداع بالمجالات الفنية والأدبية، بينما الابتكار يرتبط بالتطبيق العملي والتجاري." },
      { id: 12, type: "mcq", question: "الاراء والاستفسارات التي يطرحها العميل حول الخصائص للمنتج من مهام مصادر:", options: ["المنافسين", "براءة الاختراع", "العملاء والموردين"], answer: "العملاء والموردين", correction: "تغذية العملاء الراجعة واستفساراتهم تعتبر من أهم المصادر الخارجية للأفكار والتطوير." },
      { id: 13, type: "tf", question: "لا تساعد أنشطة البحوث والتطوير بالمنظمة في تحقيق فوائد بالمقارنة بالتكاليف المرتبطة بها.", answer: false, correction: "خطأ: العكس تماماً، البحوث والتطوير تحقق ميزة تنافسية وأرباحاً تفوق تكاليفها على المدى الطويل." },
      { id: 14, type: "tf", question: "التفكير الابتكاري مدخل نظري وليس عملي للتطبيق.", answer: false, correction: "خطأ: التفكير الابتكاري هو مدخل عملي يهدف لحل المشكلات على أرض الواقع." },
      { id: 15, type: "mcq", question: "ابتكارات سياسة التسعير تشمل على:", options: ["تخفيضات الأسعار", "المسموحات التي يمنحها البائع", "الاثنان معاً"], answer: "الاثنان معاً", correction: "كل من التخفيضات والمسموحات يمثل أساليب مبتكرة في استراتيجيات التسعير الجاذبة للعملاء." },
      { id: 16, type: "tf", question: "الابتكار عملية وراثية يولد بها الفرد وتجعله متميز بها في التفكير وإصدار الأحكام في المواقف المختلفة.", answer: false, correction: "خطأ: الابتكار مهارة مكتسبة يمكن تنميتها بالتدريب والبيئة المحفزة وليس وراثياً بحتاً." },
      { id: 17, type: "mcq", question: "من وظائف الشق الوجداني لدي الانسان:", options: ["التأمل والخيال", "المعادلات الرياضية", "الحفظ"], answer: "التأمل والخيال", correction: "الشق الوجداني (الأيمن) مسؤول عن الإبداع، الخيال، الموسيقى، والمشاعر." },
      { id: 18, type: "tf", question: "القائد الناجح يستمر في توجيه النقد لمرؤوسية.", answer: false, correction: "خطأ: النقد المستمر يقتل روح الابتكار؛ القائد الناجح يوجه ويدعم ويحفز." },
      { id: 19, type: "mcq", question: "التحليل المنطقي للمواقف والقضايا من وظائف:", options: ["الشق الأيمن", "الشق الأيسر", "غير ذلك"], answer: "الشق الأيسر", correction: "الشق الأيسر للمخ هو المسؤول عن المنطق، الأرقام، والتحليل العقلاني." },
      { id: 20, type: "tf", question: "الابتكار والإبداع مرادفات لبعضهما البعض.", answer: false, correction: "خطأ: الإبداع هو توليد الفكرة الجديدة، بينما الابتكار هو التنفيذ والتطبيق الفعلي والتجاري لها." },
      { id: 21, type: "tf", question: "الأفكار الجديدة مثل السحر، ولذلك يجب الابتعاد عن دراستها أو تطبيقها.", answer: false, correction: "خطأ: العبارة غير علمية تماماً، فالأفكار تخضع للدراسة المنهجية والتطبيق العملي لخدمة البشرية." },
      { id: 22, type: "mcq", question: "المعوقات التي ترتبط بنشأة الفرد والمحيط الذي وجد فيه:", options: ["معوقات تنظيمية", "معوقات بيئية", "معوقات أسرية"], answer: "معوقات أسرية", correction: "تنشئة الفرد الأولى ترتبط بالأسرة مباشرة، لذا تسمى معوقات أسرية إذا كانت تحد من قدراته." },
      { id: 23, type: "tf", question: "المبتكر شخص عادي مرتبط بنظريات وآراء الماضي فلا يقبل أي فكر جديد.", answer: false, correction: "خطأ: المبتكر يتسم بالمرونة الفكرية والقدرة على تحدي واختراق آراء الماضي." },
      { id: 24, type: "mcq", question: "ربط الأحداث بتفسيرات غير واقعية وتأثرها بأسباب فوق الطبيعة أو الخيال:", options: ["التفكير الناقد", "التفكير التركيبي", "التفكير الخرافي"], answer: "التفكير الخرافي", correction: "التفكير الخرافي يعتمد على الأوهام والميتافيزيقيا غير المستندة لقرائن علمية." },
      { id: 25, type: "tf", question: "قبل البدء في مرحلة التقييم يجب التأكد من إمكانية تطبيق الأفكار المبتكرة.", answer: true, correction: "صحيح، فالتأكد من القابلية للتطبيق يحمي المنظمة من إهدار الوقت في تقييم أفكار مستحيلة." },
      { id: 26, type: "tf", question: "تعتبر طريقة العصف الذهني أقل الطرق شيوعاً.", answer: false, correction: "خطأ: هي من أكثر الطرق انتشاراً وشيوعاً لتوليد الأفكار الجماعية." },
      { id: 27, type: "mcq", question: "شرح مفصل وموثق لموضوع الابتكار:", options: ["براءة الاختراع", "المجلات المتخصصة", "المؤتمرات"], answer: "براءة الاختراع", correction: "براءة الاختراع مستند رسمي يحتوي على وصف تفصيلي هندسي أو علمي دقيق لحماية الفكرة." },
      { id: 28, type: "tf", question: "تتأثر الأنشطة الابتكارية بالمنظمة بمجموعة من العوامل التي تقررها البيئة الداخلية للمنظمة.", answer: true, correction: "صحيح، كالهيكل التنظيمي، الثقافة السائدة، والدعم المالي داخل الشركة." },
      { id: 29, type: "mcq", question: "تأتي مرحلة الحضانة للفكرة ........ مرحلة الاستعداد والولادة للفكرة.", options: ["قبل", "بعد", "غير ذلك"], answer: "بعد", correction: "الحضانة تأتي بعد الاستعداد الذهني الأولي وجمع المعلومات، وقبل مرحلة الإشراق والولادة." },
      { id: 30, type: "tf", question: "لا يوجد اختلاف واضح بين الابتكار والتجديد الاختراع.", answer: false, correction: "خطأ: الاختراع هو خلق شيء لم يكن موجوداً، والابتكار هو تسويقه وتطويره بنجاح." },
      { id: 31, type: "mcq", question: "القدرة على الشرح والتوضيح وتحدي الصعاب:", options: ["الافاضة أو التوسيع", "الحساسية للمشكلات", "الاصالة"], answer: "الافاضة أو التوسيع", correction: "الإفاضة (Elaboration) تعني القدرة على إضافة تفاصيل متنوعة لتطوير الفكرة وتوضيحها." },
      { id: 32, type: "tf", question: "التفكير الابتكاري نشاط عقلي شديد التعقيد يسعى إلى إنتاج حلول غير مألوفة عند مواجهة مشكلة معينة.", answer: true, correction: "صحيح، الميزة الأساسية للابتكار هي تقديم حلول إبداعية خارجة عن المألوف." },
      { id: 33, type: "mcq", question: "المرحلة التي تحدث فيه الومضة التي تؤدي الي فكرة جديده:", options: ["التحليل الدقيق", "مرحلة الإشراق", "مرحلة حضانة الفكرة"], answer: "مرحلة الإشراق", correction: "مرحلة الإشراق (Aha! moment) هي ومضة تولد الفكرة وانبثاق الحل فجأة." },
      { id: 34, type: "tf", question: "من متطلبات عملية التخيل التنفس العميق مع الهدوء النفسي.", answer: true, correction: "صحيح، لأن الاسترخاء يقلل من تشتت العقل ويفتح المجال للخيال الخصب." },
      { id: 35, type: "mcq", question: "تشير القبعة الي التفكير السلبي:", options: ["الصفراء", "السوداء", "البيضاء"], answer: "السوداء", correction: "القبعة السوداء تمثل الحذر، النقد، والمخاطر والجوانب السلبية منطقياً." },
      { id: 36, type: "tf", question: "الخروج عن المألوف والمعتاد عليه يعتبر درب من الجنون.", answer: false, correction: "خطأ: الخروج الذكي عن المألوف هو أساس التطوير والابتكار وليس جنوناً." },
      { id: 37, type: "mcq", question: "استراتيجية المنظمة من المحددات:", options: ["الداخلية", "الشخصية", "الخارجية"], answer: "الداخلية", correction: "أي سياسة أو استراتيجية تضعها الشركة تقع ضمن نطاق محدداتها البيئية الداخلية." },
      { id: 38, type: "tf", question: "المبتكرون هم أشخاص عاديون، ولكنهم يتمتعون بقدرات ذهنية متميزة.", answer: true, correction: "صحيح، هم بشر طبيعيون طوروا قدراتهم العقلية ومهاراتهم ولم يولدوا بقوى سحرية." },
      { id: 39, type: "mcq", question: "انشطة البحوث والتطوير بالمنظمة من المصادر:", options: ["الداخلية", "الخارجية", "غير ذلك"], answer: "الداخلية", correction: "قسم الـ R&D هو إدارة تقع داخل الهيكل التنظيمي للمؤسسة." },
      { id: 40, type: "mcq", question: "في طريقة القبعات القبعة البيضاء تشير الي:", options: ["المنطق الإيجابي", "ضبط التفكير والإدارة", "التفكير الواقعي والموضوعي"], answer: "التفكير الواقعي والموضوعي", correction: "القبعة البيضاء تركز على جمع البيانات، الأرقام، والحقائق المجردة بحيادية." },
      { id: 41, type: "tf", question: "تتسم صفات وخصائص المبتكرين بالثبات والاستقرار خلال مراحل حياتهم.", answer: false, correction: "خطأ: المهارات الابتكارية مرنة ويمكن أن تزيد بالتدريب والممارسة أو تخبو بالإهمال." },
      { id: 42, type: "mcq", question: "المعوقات التي ترتبط ببيئة العمل بالمنظمة يطلق عليها معوقات:", options: ["تنظيمية", "بيئية", "ذاتية"], answer: "تنظيمية", correction: "المنظمة واللوائح والروتين داخل العمل تسمى معوقات تنظيمية." },
      { id: 43, type: "tf", question: "تقتصر أنشطة الابتكار على تطوير أو اقتراح منتج جديد وتقديمه للسوق.", answer: false, correction: "خطأ: الابتكار قد يكون في العمليات، طرق التسويق، أو الهياكل التنظيمية وليس المنتجات فقط." },
      { id: 44, type: "mcq", question: "من طرق تنمية التفكير الابتكاري لدي الفرد:", options: ["التفكير المناظر", "طريقة delfai", "طريقة العصف الذهني"], answer: "التفكير المناظر", correction: "التفكير المناظر (القياسي) أداة فردية، بينما دلفاي والعصف الذهني أدوات جماعية للمنظمات." },
      { id: 45, type: "mcq", question: "تصميم المنتج والتمييز ومدى توافر الاسم التجاري والعلامة التجارية من ابتكارات سياسة:", options: ["التسعير", "المنتج", "الترويج"], answer: "المنتج", correction: "الاسم التجاري، التغليف، والشكل الخارجي هي جوهر سياسات المنتج." },
      { id: 46, type: "tf", question: "المبتكر شخص عادي مرتبط بآراء ونظريات الماضي لا يقبل أي فكر يغيره عنها.", answer: false, correction: "خطأ: (سؤال مكرر لتأكيد المعنى) المبتكر يرفض القيود الفكرية الجامدة." },
      { id: 47, type: "mcq", question: "وسائل الاعلام من مصادر الابتكار:", options: ["الداخلية", "الخارجية", "غير ذلك"], answer: "الخارجية", correction: "وسائل الإعلام تقع خارج حدود المنظمة، فهي مصدر خارجي للمعلومات." },
      { id: 48, type: "tf", question: "يوجد أمام المنظمة العديد من المصادر لتنمية أنشطتها الابتكارية.", answer: true, correction: "صحيح، مصادر داخلية كالعاملين ومصادر خارجية كالعملاء والمنافسين." },
      { id: 49, type: "mcq", question: "حاجات غير مشبعة تخلق:", options: ["أمان", "توتر وقلق", "استقرار"], answer: "توتر وقلق", correction: "النقص في إشباع الحاجات الأساسية أو النفسية يولد حالة من عدم الارتياح والتوتر." },
      { id: 50, type: "tf", question: "يمثل الابتكار التطبيق الناجح للأفكار الإبداعية.", answer: true, correction: "صحيح، هذه العلاقة التبادلية؛ فالإبداع فكرة والابتكار تنفيذها التجاري العملي." },
      { id: 51, type: "tf", question: "عملية الابتكار والإبداع هي نتاج لحظة نفسية غير عادية يمر بها الفرد، خلالها تبدو على الفرد علامات الجنون والتوتر.", answer: false, correction: "خطأ: الابتكار عملية ذهنية منظمة وواعية وليس حالة غياب عن الوعي أو جنون." },
      { id: 52, type: "mcq", question: "ابتكارات سياسة الترويج تشمل على:", options: ["سياسة الإعلان", "منافذ التوزيع", "غير ذلك"], answer: "سياسة الإعلان", correction: "الإعلان ركيزة أساسية من ركائز المزيج الترويجي." },
      { id: 53, type: "tf", question: "من الصعوبة اعتبار المنافسين مصدر من مصادر الابتكار والإبداع.", answer: false, correction: "خطأ: المنافسون مصدر رائع للابتكار عبر ما يسمى بالهندسة العكسية وتحليل منتجاتهم لتطويرها." },
      { id: 54, type: "mcq", question: "الجمود الفكري يوقف ........ ويعطل الإبداع.", options: ["العمل", "الابتكار", "الاستعداد"], answer: "الابتكار", correction: "الجمود الذهني هو العدو الأول للمرونة والابتكار." },
      { id: 55, type: "tf", question: "التفكير الحسي هو أبسط أشكال التفكير.", answer: true, correction: "صحيح، لأنه يعتمد على الحواس المباشرة والرؤية البسيطة للأشياء دون تحليل عميق." },
      { id: 56, type: "mcq", question: "الإبداع يساوي الابتكار يساوي:", options: ["الخلق للنجاح", "الفشل", "غير ذلك"], answer: "الخلق للنجاح", correction: "تكامل المنظومة الإبداعية والابتكارية يؤدي حتماً إلى خلق أسواق وفرص نجاح جديدة." },
      { id: 57, type: "tf", question: "تعتبر إدارة الوقت والتعامل معها من المهارات الأساسية التي ينبغي أن يتحلي بها الفرد.", answer: true, correction: "صحيح، تنظيم الوقت يمنح العقل مساحة للتأمل والتفكير المتعمق." },
      { id: 58, type: "mcq", question: "مهارة الاستماع الي الاخرين بفهم وأدب يقصد بها:", options: ["مهارة التحدث", "مهارة الاستماع", "مهارة الإقناع"], answer: "مهارة الاستماع", correction: "الإنصات والاستماع الجيد يثري الحصيلة الفكرية للإنسان." },
      { id: 59, type: "tf", question: "تعني المرونة التلقائية قدرة الفرد المبتكر على تعديل النشاط الذهني عند معالجة المشاكل.", answer: true, correction: "صحيح، تعديل المسار الفكري بتلقائية عند مواجهة عقبة هو تعريف المرونة." },
      { id: 60, type: "mcq", question: "تنمية مهارات الاتصال من طرق تنمية التفكير الابتكاري:", options: ["لدى الفرد", "لدى العاملين بالمنظمة", "غير ذلك"], answer: "لدى الفرد", correction: "صياغة المهارات الشخصية كالاتصال والقراءة هي تطوير ذاتي يخص الفرد بالدرجة الأولى." },
      { id: 61, type: "tf", question: "للابتكار مفاهيم متعددة تختلف باختلاف وجهات نظر المهتمين حسب انتمائاتهم الفكرية وتخصصاتهم الأكاديمية.", answer: true, correction: "صحيح، بتعدد التخصصات (اقتصادي، نفسي، إداري) تتعدد تعريفات الابتكار." },
      { id: 62, type: "mcq", question: "تفكير منظم يعتمد على التجريب والملاحظة والقياس والاستنتاج:", options: ["التفكير المجرد", "التفكير الناقد", "التفكير العملي"], answer: "التفكير العملي", correction: "التفكير العملي أو العلمي يستند دائماً للخطوات التجريبية والقياس." },
      { id: 63, type: "tf", question: "الملاحظة والتخيل من طرق تنمية التفكير الابتكاري لدى العاملين بالمنظمة.", answer: true, correction: "صحيح، تدريب العاملين على دقة الملاحظة والتخيل يساهم في رصد المشكلات وحلها بشكل إبداعي." },
      { id: 64, type: "mcq", question: "القدرات الوجدانية تتضمن:", options: ["التأمل والخيال", "الطلاقة", "المرونة"], answer: "التأمل والخيال", correction: "الطلاقة والمرونة قدرات عقلية معرفية، بينما التأمل والخيال وجداني وعاطفي." },
      { id: 65, type: "tf", question: "يحقق المنتج الابتكاري للمنظمة (سلعة جديدة، خدمة جديدة، ...... الخ) دوراً كبيراً في دعم مركز المنظمة في السوق علاوة على تحقيق التنمية المستدامة.", answer: true, correction: "صحيح، الابتكار يضمن استمرارية الشركات وتفوقها على المنافسين." },
      { id: 66, type: "mcq", question: "وجود فرص العمل وتكوين الاسر ونظم السلامة ضد الحريق من الحاجات:", options: ["القدرات العقلية", "الأجور", "روابط اجتماعية"], answer: "روابط اجتماعية", correction: "تكوين الأسر والتفاعل الاجتماعي يقع تحت بند الروابط الاجتماعية وإشعار الفرد بالانتماء." },
      { id: 67, type: "tf", question: "الأفراد المبتكرون هم الذين يعملون في قمة الهرم التنظيمي بالمنظمة فقط.", answer: false, correction: "خطأ: الابتكار يمكن أن يظهر من أي عامل في أي مستوى تنظيمي بالمؤسسة." },
      { id: 68, type: "mcq", question: "من المصادر الداخلية للافكار الجديدة:", options: ["آراء الموردين", "الإدارة العليا", "وكلاء الموزعين"], answer: "الإدارة العليا", correction: "الإدارة العليا والموظفون هم العمود الفقري للمصادر الداخلية للشركة." },
      { id: 69, type: "tf", question: "من الصعب تنمية واكتساب مهارة الابتكار والإبداع لأنها من الصفات الموروثة لدى الإنسان.", answer: false, correction: "خطأ: يمكن اكتسابها وتنميتها ببرامج التدريب وحل المشكلات والبيئة الخصبة." },
      { id: 70, type: "mcq", question: "المساهمه في التطوير التكنولوجي من اجل ايجاد ابتكارات جديدة من مهام أنشطة:", options: ["المنافسين", "العملاء والموردين", "أنشطة البحوث والتطوير"], answer: "أنشطة البحوث والتطوير", correction: "هذا هو الدور الجوهري والأساسي لقطاع البحوث والتطوير (R&D)." },
      { id: 71, type: "tf", question: "لا تشعر بالسعادة أو الابتسامة عندما تستمع إلى الأفكار التي ترغبها.", answer: false, correction: "خطأ: العقل يفرز هرمونات السعادة والارتياح عند ملامسة أفكار تلبي رغباته واهتماماته." },
      { id: 72, type: "mcq", question: "يشتمل التفكير الابتكاري على مجموعة من القدرات العقلية تتميز:", options: ["متواضعة", "ضعيفة", "متميزة ومتداخلة"], answer: "متميزة ومتداخلة", correction: "تتداخل قدرات كالمرونة والطلاقة والأصالة لإنتاج الفكر الابتكاري المتميز." },
      { id: 73, type: "tf", question: "تستطيع المنظمات الحصول على الأفكار الجديدة من مصادرها الداخلية (الإدارة والأنشطة فقط).", answer: false, correction: "خطأ: تستطيع الحصول عليها أيضاً من مصادر خارجية متعددة كالمستهلكين والجامعات." },
      { id: 74, type: "mcq", question: "عكس الجمود الذهني:", options: ["الطلاقة", "المرونة", "الاصالة"], answer: "المرونة", correction: "المرونة هي النقيض المباشر للجمود والتعصب الفكري." },
      { id: 75, type: "tf", question: "إن أعظم لحظات الصراع الذهني لدى الإنسان هي أكثر اللحظات ابتكاراً وإبداعاً.", answer: true, correction: "صحيح، لأن الحاجة والصراع الفكري يولدان ضغطاً يدفع العقل لإيجاد حلول غير ملوفة." },
      { id: 76, type: "mcq", question: "تقوم طريقة علي اساس اختيار مجموعة من الخبراء في مجال المشكلة:", options: ["دلفاى", "المباراة", "العصف الذهنى"], answer: "دلفاى", correction: "أسلوب دلفاي يعتمد على استطلاع آراء مجموعة خبراء بشكل معزول وسري وجولات متعددة." },
      { id: 77, type: "tf", question: "التخيل أو الخيال من أحد الوظائف الرئيسية للعقل.", answer: true, correction: "صحيح، بدونه لا يمكن بناء تصورات مستقبلية أو ابتكار أدوات جديدة." },
      { id: 78, type: "mcq", question: "ابتكارات سياسة المنتج تشمل على:", options: ["النشر", "خدمات ما بعد البيع", "تخفيض الأسعار"], answer: "خدمات ما بعد البيع", correction: "الضمان والتركيب وصيانة ما بعد البيع من الابتكارات المضافة لسياسة المنتج لتثبيت قيمته." },
      { id: 79, type: "tf", question: "التفكير الابتكاري عبارة عن مدخل ومفهوم نظري من الصعب تطبيقه.", answer: false, correction: "خطأ: (مكرر لتأكيد الأهمية) هو أسلوب تطبيقي نرى نتائجه في جميع المنتجات من حولنا." },
      { id: 80, type: "mcq", question: "صاحب الفكرة الإبداعية يتبناها ويدعمها ويطورها بشكل مستمر حتى تتحول الفكرة الإبداعية إلى:", options: ["خيال", "ابتكار جديد", "الاثنان معاً"], answer: "ابتكار جديد", correction: "تطوير الفكرة الإبداعية وترجمتها واقعياً ينتج عنه ابتكار جديد جاهز للاستخدام." },
      { id: 81, type: "tf", question: "الطلاقة اللفظية هي القدرة على تقديم إضافات على أشكال معينة لتكوين رسوم حقيقية.", answer: false, correction: "خطأ: تقديم إضافات وتفاصيل على الأشكال يسمى طلاقة الأشكال أو التفاصيل." },
      { id: 82, type: "mcq", question: "تزويد المنظمة بالمعارف واستغلالها يهدف لتحقيق الميزة:", options: ["الاقتصادية", "التنافسية", "الاجتماعية"], answer: "التنافسية", correction: "المعرفة والابتكار هما الوقود الأساسي لبناء وتطوير الميزة التنافسية للشركات اليوم." },
      { id: 83, type: "tf", question: "لا يوجد علاقة واضحة بين الأنشطة الابتكارية لدى الإنسان وفسيولوجيا المخ البشري.", answer: false, correction: "خطأ: توجد علاقة وطيدة، حيث ينقسم المخ لشقين يكمل كل منهما الآخر في العمليات الذهنية والإبداعية." },
      { id: 84, type: "mcq", question: "البيئة الاقتصادية والقانونية من المحددات:", options: ["الداخلية", "الشخصية", "الخارجية"], answer: "الخارجية", correction: "القوانين والوضع الاقتصادي العام يمثلان بيئة خارجية كلياً تفرض شروطها على المنظمات." },
      { id: 85, type: "tf", question: "يوجد عدة مراحل للتفكير الابتكاري، تتسم بأنها متعاقبة ومتزامنة.", answer: true, correction: "صحيح، كالحضانة والإشراق والتحقق، فهي خطوات متتالية ومتداخلة أحياناً." },
      { id: 86, type: "mcq", question: "عدم الثقة بالنفس والافتقار الي التحدي وروح المغامرة من معوقات:", options: ["الفرد", "الأسرى", "غير ذلك"], answer: "الفرد", correction: "الخوف والتردد وضعف الثقة هي معوقات ذاتية نفسية تخص الفرد نفسه." },
      { id: 87, type: "tf", question: "القبعة الخضراء هي قبعة الأفكار الجديدة والتفكير الخلاق.", answer: true, correction: "صحيح، اللون الأخضر يرمز للنمو والخصوبة وتوليد الأفكار البديلة والحلول الإبداعية." },
      { id: 88, type: "mcq", question: "قسم العلماء مخ الانسان الى شقين هما:", options: ["شق أيمن وشق أيسر", "شق وجداني وشق منطقي", "كلاهما صحيح"], answer: "كلاهما صحيح", correction: "تصح التسميتان علمياً ومجازياً (الأيمن هو الوجدان التخيلي، والأيسر هو المنطق التحليلي)." },
      { id: 89, type: "tf", question: "الأفراد المبتكرين هم أفراد لديهم أنماط وأفكار غريبة وتصورات غير واقعية.", answer: false, correction: "خطأ: أفكارهم قد تكون جديدة وغير مألوفة، لكنها واقعية وقابلة للتطبيق وليست أوهاماً." },
      { id: 90, type: "mcq", question: "توفر الدول امكانيات مادية وبشرية لدعم انشطة البحث والابتكار:", options: ["النامية", "المتقدمة", "العربية"], answer: "المتقدمة", correction: "الدول المتقدمة تخصص ميزانيات ضخمة من ناتجها القومي لدعم البحث العلمي والابتكار." },
      { id: 91, type: "tf", question: "هل للابتكار دور في إشباع الحاجات الإنسانية.", answer: true, correction: "صحيح، فكل الأجهزة والوسائل الحديثة (كالطب والاتصالات) جاءت بابتكارات أشبعت وحلت مشكلات بشرية." },
      { id: 92, type: "mcq", question: "يسمي الشق الايمن في مخ الانسان:", options: ["الشق الوجداني", "الشق المنطقى", "غير ذلك"], answer: "الشق الوجداني", correction: "الشق الأيمن يتحكم في التخيل، المشاعر، الفنون والإدراك الوجداني الشامل." },
      { id: 93, type: "tf", question: "جميع التغيرات التي تحدث في المنظمة تؤدي إلى ابتكارات.", answer: false, correction: "خطأ: ليست كل التغييرات ابتكاراً، فقد تكون روتينية أو تنظيمية بسيطة أو حتى سلبية." },
      { id: 94, type: "mcq", question: "احدي الطرق الاكثر شيوعا وانتشارا في تنمية التفكير الابتكاري لدي العملين بالمنظمات:", options: ["طريقة العصف الذهني", "المباراة", "دلفاي"], answer: "طريقة العصف الذهني", correction: "العصف الذهني (Brainstorming) هو الأسهل والأكثر تطبيقاً في بيئات العمل لجمع الأفكار الحرة." },
      { id: 95, type: "tf", question: "تقوم نظرية المباراة على أساس اختيار مجموعة من الخبراء في مجال المشكلة.", answer: false, correction: "خطأ: أسلوب دلفاي هو الذي يعتمد على الخبراء، أما المباراة فهي نمذجة رياضية للقرارات التنافسية." },
      { id: 96, type: "mcq", question: "الابتكار يولد:", options: ["الأفكار", "الاختراع", "الكسل"], answer: "الأفكار", correction: "الابتكار يحفز العقل باستمرار على توليد أفكار جديدة للتطوير وحل العقبات." },
      { id: 97, type: "tf", question: "لقد ساعدت أنظمة الحاسب الآلي وتطبيقاتها المتعددة على تعدد مصادر المعرفة أمام الباحثين والعلماء.", answer: true, correction: "صحيح، حيث سهلت التكنولوجيا والإنترنت الوصول لقواعد البيانات العلمية عالمياً." },
      { id: 98, type: "mcq", question: "تشير القبعة الي المنطق الايجابي:", options: ["البيضاء", "الحمراء", "الصفراء"], answer: "الصفراء", correction: "القبعة الصفراء تمثل الشمس والبهجة والمنطق الإيجابي الذي يبحث عن الفوائد والمميزات." },
      { id: 99, type: "tf", question: "تلعب أنظمة البحوث والتطوير دوراً هاماً في التطور التكنولوجي وخلق منتج جديد يلبي رغبات العملاء.", answer: true, correction: "صحيح، لأن الـ R&D يترجم حاجة السوق لتحديثات تقنية ومنتجات متطورة." },
      { id: 100, type: "mcq", question: "سياسة الهدم الخلاق تعني وجود ليس ساكناً بل في حركة تدفق وحركية وديناميكية:", options: ["هيكل اجتماعي", "هيكل اقتصادي", "هيكل بيئي"], answer: "هيكل اقتصادي", correction: "مصطلح الهدم الخلاق صاغه شومبيتر لوصف كيف يقوم الابتكار بزعزعة وهدم الهياكل الاقتصادية القديمة لبناء جديدة." },
      { id: 101, type: "tf", question: "تلعب المثابرة والقدرة على الخيال والتحمل دور مهم في اكتساب وتنمية المهارات الابتكارية.", answer: true, correction: "صحيح، فالابتكار يحتاج لنَفَس طويل وتحمل للفشل المتكرر قبل الوصول للحل." },
      { id: 102, type: "mcq", question: "تتمثل مرحلة ........ في التأكد من صحة ودقة الإنتاج الذي تم التوصل إليه من المراحل السابقة.", options: ["مرحلة الإشراف", "مرحلة حضانة الفكرة", "مرحلة التحقق"], answer: "مرحلة التحقق", correction: "مرحلة التحقق أو التقييم هي الخطوة النهائية لإخضاع الفكرة للتجريب الفعلي والمنطقي." },
      { id: 103, type: "tf", question: "التفكير الابتكاري يهدف إلى إنتاج منتج ابتكاري جديد لم يصل إليه من قبل.", answer: true, correction: "صحيح، فالأصالة والجدة هما الركيزتان الأساسيتان للمنتج الابتكاري." },
      { id: 104, type: "mcq", question: "ينقسم النشاط العقلي إلى:", options: ["قدرات معرفية", "قدرات وجدانية", "الاثنان معاً"], answer: "الاثنان معاً", correction: "العقل البشري يوازن ويعتمد على المعرفة (الذكاء والتحليل) والوجدان (المشاعر والخيال) معاً." },
      { id: 105, type: "tf", question: "ليس للأنشطة الابتكارية دور كبير للدول في ظل التغيرات التي حدثت خلال السنوات الماضية والانفتاح على الأسواق بين الدول.", answer: false, correction: "خطأ: بل أصبحت الابتكارية هي السلاح الأول للدول لحماية اقتصاداتها في عصر العولمة." },
      { id: 106, type: "mcq", question: "التفكير الذي يتصف بالبساطة والسطحية بعيداً عن المشكلات الصعبة:", options: ["التفكير التكتيكي", "التفكير المحسوس", "التفكير الحدسي"], answer: "التفكير المحسوس", correction: "التفكير المحسوس يكتفي بظواهر الأشياء المادية الملموسة دون تعمق أو تجريد." },
      { id: 107, type: "tf", question: "الشخص المبدع هو الذي يقوم بحل المشكلات.", answer: true, correction: "صحيح، جوهر الإبداع والابتكار يكمن في إيجاد ممرات وحلول مبتكرة للمشاكل المعقدة." },
      { id: 108, type: "mcq", question: "كثير من الجامعات تشجع الطلاب والاساتذة علي:", options: ["البحث", "الابتكار", "الاتنان معاً"], answer: "الاتنان معاً", correction: "الجامعات الحديثة تحولت لمراكز ريادية تدعم البحث العلمي المرتبط بالابتكار التجاري والصناعي." },
      { id: 109, type: "tf", question: "للمبتكر حواس أخرى وقدرات خفية يستطيع من خلالها تحقيق التميز عند مواجهة المواقف والصعاب.", answer: false, correction: "خطأ: المبتكر لا يملك حواساً سحرية خفية بل قدرات ذهنية مدربة ومصقولة بشكل ممتاز." },
      { id: 110, type: "mcq", question: "الطريقة المستخدمة في التفكير للوصول إلى المنتج الابتكاري يسمى:", options: ["التفكير الابتكاري", "الطلاقة اللفظية", "الابداع"], answer: "التفكير الابتكاري", correction: "الآلية والمنهجية المتبعة ذهنياً لإنتاج فكرة وتطبيقها تسمى عملية التفكير الابتكاري." },
      { id: 111, type: "tf", question: "القدرات الابتكارية حكراً على فئة موهوبة وهم العلماء.", answer: false, correction: "خطأ: الابتكار متاح لكل إنسان يمتلك الرغبة ويتدرب على استراتيجياته في مجاله الخاص." },
      { id: 112, type: "mcq", question: "قدرة المرسل في توصيل المعلومات:", options: ["مهارة الإقناع", "مهارة التحدث", "مهارة الاستماع"], answer: "مهارة التحدث", correction: "التحدث البق والمنظم هو الأداة الأساسية للمرسل لنقل رسالته بوضوح للآخرين." },
      { id: 113, type: "tf", question: "القبعة الحمراء تشير إلى ضبط التفكير والإدارة.", answer: false, correction: "خطأ: القبعة الزرقاء هي لضبط التفكير، بينما الحمراء مخصصة للمشاعر والعواطف والحدس." },
      { id: 114, type: "mcq", question: "طبقاً للاهتمام بأنشطة الابتكار يمكن تقسيم ادارة المنظمات الي:", options: ["إدارة تقليدية", "إدارة غير تقليدية", "الاثنان"], answer: "الاثنان", correction: "تنقسم الإدارات بين متمسكة بالنمط التقليدي القديم، وإدارات حديثة مرنة وغير تقليدية تتبنى الابتكار." },
      { id: 115, type: "tf", question: "لا يوجد علاقة واضحة بين الأنشطة الابتكارية لدى الإنسان وفسيولوجيا المخ البشري.", answer: false, correction: "خطأ: (سؤال مكرر) أثبتت الدراسات الطبية ارتباط التفكير الإبداعي والمنطقي بوظائف فصوص الشقين الكرويين." },
      { id: 116, type: "mcq", question: "وجود بيئة مواتية للابتكار تساعد علي:", options: ["توفير الأمن النفسي", "بث روح المغامرة", "الاثنان"], answer: "الاثنان", correction: "البيئة الإيجابية تضمن للموظف ألا يخاف من تبعات الفشل (أمن نفسي) وتحفزه على التجريب والمغامرة." },
      { id: 117, type: "mcq", question: "يتصف الشخص القائم بالملاحظة:", options: ["استخدام الجمل الطويلة", "التحيز", "الموضوعية"], answer: "الموضوعية", correction: "الملاحظة العلمية الدقيقة تتطلب التجرد التام من الأهواء الشخصية والالتزام بالموضوعية والحياد." },
      { id: 118, type: "mcq", question: "هي مكان مجهول لا يعرفه أحد إلا أنت هذا المكان يحافظ عليها ويساعدها على النمو.", options: ["حضانة الأفكار", "التحليل الدقيق", "الاستعداد"], answer: "حضانة الأفكار", correction: "مرحلة الحضانة (Incubation) هي فترة اختمار الفكرة في العقل الباطن بعيداً عن التشويش الخارجي." }
    ];

    // دالة الخلط العشوائي المعتمدة (Fisher-Yates Shuffle)
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function renderShuffledQuiz() {
        const container = document.getElementById('quiz-container');
        
        // خلط مصفوفة الأسئلة المتكاملة والمحدثة
        const shuffledList = shuffleArray([...allQuestionsCorrectedAndRandomized]);
        
        let html = '';
        
        shuffledList.forEach((q, index) => {
            if (q.type === 'tf') {
                // بناء كارت صواب وخطأ
                html += `
                    <div class="question-card" id="card-${q.id}">
                        <div class="question-type-badge" style="background: rgba(108, 92, 231, 0.2); color: #a855f7;">صواب أم خطأ</div>
                        <div class="question-text">${index + 1}. ${q.question}</div>
                        <div class="options-container tf-container">
                            <button class="option-btn" onclick="checkTrueFalse(${q.id}, true, this)">صح</button>
                            <button class="option-btn" onclick="checkTrueFalse(${q.id}, false, this)">خطأ</button>
                        </div>
                        <div class="correction-box" id="correction-${q.id}"><strong>التصحيح والتعليل الفوري:</strong> ${q.correction}</div>
                    </div>
                `;
            } else if (q.type === 'mcq') {
                // بناء كارت الاختيار من متعدد
                let optionsHtml = '';
                q.options.forEach(opt => {
                    optionsHtml += `<button class="option-btn" onclick="checkMultipleChoice(${q.id}, '${opt}', this)">${opt}</button>`;
                });

                html += `
                    <div class="question-card" id="card-${q.id}">
                        <div class="question-type-badge" style="background: rgba(0, 206, 201, 0.2); color: #00cec9;">اختيار من متعدد</div>
                        <div class="question-text">${index + 1}. ${q.question}</div>
                        <div class="options-container">
                            ${optionsHtml}
                        </div>
                        <div class="correction-box" id="correction-${q.id}"><strong>التصحيح والتعليل الفوري:</strong> ${q.correction}</div>
                    </div>
                `;
            }
        });
        
        container.innerHTML = html;
    }

    // دالة فحص أسئلة صواب وخطأ
    function checkTrueFalse(id, userAnswer, clickedBtn) {
        const question = allQuestionsCorrectedAndRandomized.find(q => q.id === id);
        const card = document.getElementById(`card-${id}`);
        const buttons = card.querySelectorAll('.option-btn');
        const correctionBox = document.getElementById(`correction-${id}`);

        // تعطيل الأزرار داخل هذا الكارت فقط لمنع التلاعب
        buttons.forEach(btn => btn.classList.add('disabled'));

        if (userAnswer === question.answer) {
            clickedBtn.classList.add('correct');
            totalCorrect++;
        } else {
            clickedBtn.classList.add('wrong');
            // تلوين الزر الآخر الصحيح تلقائياً لمساعدة الطالب
            buttons.forEach(btn => {
                if((btn.innerText === 'صح' && question.answer === true) || (btn.innerText === 'خطأ' && question.answer === false)) {
                    btn.classList.add('correct');
                }
            });
            totalWrong++;
        }

        // إظهار صندوق التعليل
        correctionBox.classList.add('show-info');
        updateScoreBoard();
    }

    // دالة فحص أسئلة الاختيار من متعدد
    function checkMultipleChoice(id, userOption, clickedBtn) {
        const question = allQuestionsCorrectedAndRandomized.find(q => q.id === id);
        const card = document.getElementById(`card-${id}`);
        const buttons = card.querySelectorAll('.option-btn');
        const correctionBox = document.getElementById(`correction-${id}`);

        buttons.forEach(btn => btn.classList.add('disabled'));

        if (userOption === question.answer) {
            clickedBtn.classList.add('correct');
            totalCorrect++;
        } else {
            clickedBtn.classList.add('wrong');
            // البحث عن الزر الذي يحمل الإجابة الصحيحة وتلوينه بالأخضر
            buttons.forEach(btn => {
                if (btn.innerText === question.answer) {
                    btn.classList.add('correct');
                }
            });
            totalWrong++;
        }

        correctionBox.classList.add('show-info');
        updateScoreBoard();
    }

    // تشغيل نظام بناء وعشوائية الأسئلة فور تحميل الصفحة
    window.onload = function() {
        renderShuffledQuiz();
    };
</script>
